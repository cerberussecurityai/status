# Cerberus public status page — powered by Upptime (https://upptime.js.org)
owner: cerberussecurityai
repo: status

sites:
  - name: API (Event Ingestion)
    url: https://api.cerberussecurity.ai/ready # deep check: verifies Kafka + database
  - name: Dashboard
    url: https://app.cerberussecurity.ai/health
  - name: Client API
    url: https://backend.cerberussecurity.ai/health

status-website:
  # Live immediately at https://cerberussecurityai.github.io/status
  baseUrl: /status
  # To use the custom domain: add a DNS CNAME (status -> cerberussecurityai.github.io)
  # at the registrar, then comment out baseUrl and uncomment the next line:
  # cname: status.cerberussecurity.ai
  name: Cerberus Status
  introTitle: "Cerberus — real-time and historical status"
  introMessage: Live status of the Cerberus API monitoring platform. Uptime is checked every 5 minutes by GitHub Actions. Subscribe to updates via the RSS/Atom feeds.
  navbar:
    - title: Status
      href: /
    - title: GitHub
      href: https://github.com/cerberussecurityai/status

assignees:
  - griff1
